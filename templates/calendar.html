<!-- calendar.html — month-view calendar, rendered inside layouts/main.html -->
<div class="flex h-[calc(100vh-3.5rem)] overflow-hidden"
     x-data="{
         showCreateModal: false,
         allDay: false
     }">

    <!-- Mobile sidebar backdrop -->
    <div x-show="$store.ui && $store.ui.sidebarOpen"
         x-cloak
         class="lg:hidden fixed inset-0 top-14 z-40 bg-black/40"
         @click="$store.ui.sidebarOpen = false">
    </div>

    <!-- ===== LEFT SIDEBAR ===== -->
    <aside class="flex-shrink-0 flex flex-col w-56 bg-white border-r border-gray-200
                  fixed lg:static top-14 bottom-0 left-0 z-50
                  transition-transform duration-250 ease-out
                  -translate-x-full lg:translate-x-0"
           :class="{ 'translate-x-0 shadow-xl': $store.ui && $store.ui.sidebarOpen }">

        <!-- New Event button -->
        <div class="p-4 flex-shrink-0">
            <button @click="showCreateModal = true"
                    class="w-full flex items-center justify-center gap-2 px-4 py-2.5
                           bg-blue-600 hover:bg-blue-700 text-white rounded-2xl shadow-sm
                           text-sm font-medium transition-colors">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                New Event
            </button>
        </div>

        <!-- Calendar nav -->
        <nav class="flex-1 px-2 pb-4 space-y-0.5">
            <a href="/calendar"
               class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm font-medium bg-blue-50 text-blue-700">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                Month view
            </a>
            <a href="/calendar/week"
               class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-100">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                </svg>
                Week view
            </a>
            <a href="/inbox"
               class="flex items-center gap-3 px-3 py-2 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-100">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                Back to Mail
            </a>
        </nav>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">

        <!-- Calendar toolbar -->
        <div class="flex items-center justify-between px-5 py-3 border-b border-gray-200 flex-shrink-0 bg-white">
            <div class="flex items-center gap-3">
                <a href="/calendar?year={{.PrevYear}}&month={{.PrevMonth}}"
                   class="p-1.5 rounded-full hover:bg-gray-100 text-gray-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h2 class="text-base font-semibold text-gray-900 min-w-[10rem] text-center">
                    {{.MonthName}} {{.Year}}
                </h2>
                <a href="/calendar?year={{.NextYear}}&month={{.NextMonth}}"
                   class="p-1.5 rounded-full hover:bg-gray-100 text-gray-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>
            <div class="flex items-center gap-2">
                <a href="/calendar?year={{.Today.Year}}&month={{.Today.Month}}"
                   class="text-xs font-medium px-3 py-1.5 border border-gray-300 rounded-full text-gray-700 hover:bg-gray-50">
                    Today
                </a>
                <a href="/calendar/week"
                   class="text-xs font-medium px-3 py-1.5 border border-gray-300 rounded-full text-gray-700 hover:bg-gray-50">
                    Week
                </a>
            </div>
        </div>

        <!-- Weekday header -->
        <div class="grid grid-cols-7 text-center text-xs font-medium text-gray-500 border-b border-gray-100 bg-white flex-shrink-0">
            <div class="py-2">Mon</div>
            <div class="py-2">Tue</div>
            <div class="py-2">Wed</div>
            <div class="py-2">Thu</div>
            <div class="py-2">Fri</div>
            <div class="py-2 text-blue-400">Sat</div>
            <div class="py-2 text-blue-400">Sun</div>
        </div>

        <!-- 6-week grid -->
        <div class="flex-1 overflow-y-auto bg-gray-50">
            <div class="grid grid-cols-7" style="grid-template-rows: repeat(6, minmax(96px,1fr)); min-height:100%">
                {{range .Grid}}
                <div class="border-b border-r border-gray-100 p-1 flex flex-col bg-white
                             {{if not .IsCurrentMonth}}opacity-40{{end}}">
                    <!-- Day number -->
                    <div class="flex items-start mb-0.5">
                        <span class="inline-flex items-center justify-center w-6 h-6 text-xs leading-none
                                     {{if .IsToday}}bg-blue-600 text-white rounded-full font-bold{{else if .IsCurrentMonth}}text-gray-700{{else}}text-gray-300{{end}}">
                            {{.Date.Day}}
                        </span>
                    </div>
                    <!-- Events on this day -->
                    {{range .Events}}
                    <a href="/calendar/event/{{.UID}}"
                       hx-get="/calendar/event/{{.UID}}"
                       hx-target="#cal-event-detail"
                       hx-swap="innerHTML"
                       class="block truncate text-xs px-1 py-0.5 mb-0.5 rounded cursor-pointer
                              bg-blue-100 text-blue-800 hover:bg-blue-200 transition-colors leading-snug">
                        {{if not .AllDay}}{{.Start.Format "15:04"}} {{end}}{{.Summary}}
                    </a>
                    {{end}}
                </div>
                {{end}}
            </div>
        </div>
    </div>

    <!-- Event detail panel (HTMX target, hidden until populated) -->
    <div id="cal-event-detail"
         class="w-0 overflow-hidden border-l border-gray-200 bg-white flex-shrink-0 transition-all duration-200
                [&:not(:empty)]:w-72">
    </div>

    <!-- ===== CREATE EVENT MODAL (docked bottom-right) ===== -->
    <div x-show="showCreateModal"
         x-cloak
         class="fixed bottom-4 right-4 z-50 w-96 bg-white rounded-xl shadow-2xl ring-1 ring-black/10 flex flex-col"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4">

        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-gray-50 rounded-t-xl flex-shrink-0">
            <span class="text-sm font-semibold text-gray-800">New Event</span>
            <button @click="showCreateModal = false" class="p-1 rounded-full hover:bg-gray-200 text-gray-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form method="POST" action="/calendar/event" class="p-4 flex flex-col gap-3">
            <input type="text" name="summary" placeholder="Event title *" required
                   class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg
                          focus:outline-none focus:ring-2 focus:ring-blue-300">

            <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer">
                <input type="checkbox" name="all_day" value="on" x-model="allDay" class="rounded">
                All day
            </label>

            <div x-show="allDay">
                <label class="block text-xs text-gray-500 mb-1">Date</label>
                <input type="date" name="start_date"
                       class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300">
            </div>

            <div x-show="!allDay" class="flex gap-2">
                <div class="flex-1">
                    <label class="block text-xs text-gray-500 mb-1">Start</label>
                    <input type="datetime-local" name="start"
                           class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300">
                </div>
                <div class="flex-1">
                    <label class="block text-xs text-gray-500 mb-1">End</label>
                    <input type="datetime-local" name="end"
                           class="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300">
                </div>
            </div>

            <input type="text" name="location" placeholder="Location"
                   class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg
                          focus:outline-none focus:ring-2 focus:ring-blue-300">

            <textarea name="description" rows="2" placeholder="Description"
                      class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg
                             focus:outline-none focus:ring-2 focus:ring-blue-300 resize-none"></textarea>

            <div class="flex justify-end gap-2 pt-1">
                <button type="button" @click="showCreateModal = false"
                        class="px-4 py-2 text-xs text-gray-600 hover:bg-gray-100 rounded-lg">
                    Cancel
                </button>
                <button type="submit"
                        class="px-4 py-2 text-xs font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg">
                    Create
                </button>
            </div>
        </form>
    </div>

</div>
