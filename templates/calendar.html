<!-- calendar.html — month-view calendar, rendered inside layouts/main.html -->
<div class="cal-shell"
     x-data="{
         showCreateModal: false,
         allDay: false
     }">

    <!-- Mobile sidebar backdrop -->
    <div x-show="$store.ui && $store.ui.sidebarOpen"
         x-cloak
         class="sidebar-backdrop"
         @click="$store.ui.sidebarOpen = false">
    </div>

    <!-- ===== LEFT SIDEBAR ===== -->
    <aside class="sidebar"
           :class="{ 'is-open': $store.ui && $store.ui.sidebarOpen }">

        <div class="sidebar__compose">
            <button class="btn-compose" @click="showCreateModal = true">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                New Event
            </button>
        </div>

        <nav class="sidebar__nav">
            <a href="/calendar" class="nav-item is-active">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                <span class="nav-item__label">Month view</span>
            </a>
            <a href="/calendar/week" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                </svg>
                <span class="nav-item__label">Week view</span>
            </a>
            <a href="/inbox" class="nav-item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <span class="nav-item__label">Back to Mail</span>
            </a>
        </nav>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="cal-main">

        <!-- Toolbar -->
        <div class="cal-toolbar">
            <div class="cal-nav">
                <a href="/calendar?year={{.PrevYear}}&month={{.PrevMonth}}" class="cal-nav__btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </a>
                <h2 class="cal-nav__title">{{.MonthName}} {{.Year}}</h2>
                <a href="/calendar?year={{.NextYear}}&month={{.NextMonth}}" class="cal-nav__btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>
            <div class="cal-actions">
                <a href="/calendar?year={{.Today.Year}}&month={{.Today.Month}}" class="cal-action-btn">Today</a>
                <a href="/calendar/week" class="cal-action-btn">Week</a>
            </div>
        </div>

        <!-- Weekday header -->
        <div class="cal-header">
            <div class="cal-header__day">Mon</div>
            <div class="cal-header__day">Tue</div>
            <div class="cal-header__day">Wed</div>
            <div class="cal-header__day">Thu</div>
            <div class="cal-header__day">Fri</div>
            <div class="cal-header__day cal-header__day--weekend">Sat</div>
            <div class="cal-header__day cal-header__day--weekend">Sun</div>
        </div>

        <!-- 6-week grid -->
        <div class="cal-grid">
            <div class="cal-grid-inner">
                {{range .Grid}}
                <div class="cal-cell {{if not .IsCurrentMonth}}cal-cell--other-month{{end}}">
                    <div class="cal-cell__day-num">
                        <span class="cal-cell__num {{if .IsToday}}cal-cell__num--today{{end}}">
                            {{.Date.Day}}
                        </span>
                    </div>
                    {{range .Events}}
                    <a href="/calendar/event/{{.UID}}"
                       hx-get="/calendar/event/{{.UID}}"
                       hx-target="#cal-event-detail"
                       hx-swap="innerHTML"
                       class="cal-event-chip">
                        {{if not .AllDay}}{{.Start.Format "15:04"}} {{end}}{{.Summary}}
                    </a>
                    {{end}}
                </div>
                {{end}}
            </div>
        </div>
    </div>

    <!-- Event detail panel (HTMX target) -->
    <div id="cal-event-detail" class="event-panel"></div>

    <!-- ===== CREATE EVENT MODAL ===== -->
    <div x-show="showCreateModal" x-cloak class="modal-card"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4">

        <div class="modal-card__header">
            <span class="modal-card__title">New Event</span>
            <button class="modal-card__close" @click="showCreateModal = false">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form method="POST" action="/calendar/event" class="modal-card__body">
            <input type="text" name="summary" placeholder="Event title *" required class="field-input">

            <label class="field-check">
                <input type="checkbox" name="all_day" value="on" x-model="allDay">
                All day
            </label>

            <div x-show="allDay">
                <label class="field-label">Date</label>
                <input type="date" name="start_date" class="field-input">
            </div>

            <div x-show="!allDay" style="display:flex;gap:8px;">
                <div style="flex:1;">
                    <label class="field-label">Start</label>
                    <input type="datetime-local" name="start" class="field-input">
                </div>
                <div style="flex:1;">
                    <label class="field-label">End</label>
                    <input type="datetime-local" name="end" class="field-input">
                </div>
            </div>

            <input type="text" name="location" placeholder="Location" class="field-input">
            <textarea name="description" rows="2" placeholder="Description" class="field-input" style="resize:none;"></textarea>

            <div class="modal-card__footer" style="padding:0;border:none;">
                <button type="button" class="btn-sm-cancel" @click="showCreateModal = false">Cancel</button>
                <button type="submit" class="btn-sm-primary">Create</button>
            </div>
        </form>
    </div>

</div>
