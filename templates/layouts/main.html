<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} — lilmail{{else}}lilmail{{end}}</title>
    <meta name="description" content="lilmail — a lightweight, database-free webmail client that connects to any IMAP/SMTP mailbox and ships as a single self-contained Go binary.">
    <meta name="theme-color" content="#F2674E">
    <meta name="color-scheme" content="light dark">

    <!-- Favicons / app icons -->
    <link rel="icon" type="image/svg+xml" href="/assets/lilmail-favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icon-180.png">
    <link rel="manifest" href="/assets/site.webmanifest">

    <!-- Open Graph / social -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="lilmail">
    <meta property="og:title" content="lilmail — self-hostable webmail in one Go binary">
    <meta property="og:description" content="A lightweight, database-free webmail client that connects to any IMAP/SMTP mailbox. Server-rendered, no build step, no database.">
    <meta property="og:image" content="/assets/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="lilmail — self-hostable webmail in one Go binary">
    <meta name="twitter:description" content="A lightweight, database-free webmail client that connects to any IMAP/SMTP mailbox.">
    <meta name="twitter:image" content="/assets/og-image.png">

    <link rel="stylesheet" href="/assets/css/mail.css">
    <!-- HTMX -->
    <script src="/assets/vendor/htmx.min.js"></script>
    <!-- Alpine.js -->
    <script defer src="/assets/vendor/alpine.min.js"></script>
</head>
<body>

<div id="htmx-loading-bar"></div>

{{if .Username}}
<!-- TOP BAR -->
<header class="topbar" x-data>
    <!-- Hamburger (mobile) -->
    <button class="topbar__hamburger"
            @click="$store.ui.sidebarOpen = !$store.ui.sidebarOpen"
            aria-label="Toggle sidebar">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>

    <!-- Logo -->
    <a href="/inbox" class="topbar__logo" aria-label="lilmail — go to inbox">
        <img src="/assets/lilmail-favicon.svg" alt="" class="topbar__logo-img" aria-hidden="true">
        <span class="topbar__logo-word">lilmail</span>
    </a>

    <!-- Search -->
    <div class="topbar__search">
        <svg class="topbar__search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
        </svg>
        <input type="search" placeholder="Search mail"
               class="topbar__search-input"
               aria-label="Search mail"
               name="q"
               hx-get="/api/search"
               hx-trigger="search, keyup changed delay:500ms"
               hx-target="#email-list-inner"
               hx-swap="innerHTML"
               hx-include="[name='q']">
    </div>

    <!-- Account -->
    <div class="topbar__account">
        <span class="topbar__username">{{.Username}}</span>
        <a href="/settings" class="topbar__settings" title="Settings">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
        </a>
        <a href="/logout" class="topbar__logout">Sign out</a>
    </div>
</header>
{{end}}

<!-- token carrier for JS fetch calls in compose / autocomplete -->
{{if .Token}}<span id="app-token" data-token="{{.Token}}" hidden></span>{{end}}

<!-- MAIN CONTENT -->
<div class="{{if .Username}}app-body{{end}}"
     x-data="{
         showEmailViewer: false,
         showComposeModal: false,
         toasts: [],
         addToast(toast) {
             const id = Date.now();
             this.toasts.push({ id, ...toast });
             setTimeout(() => this.removeToast(id), 5000);
         },
         removeToast(id) {
             this.toasts = this.toasts.filter(t => t.id !== id);
         }
     }"
     @show-toast.window="addToast($event.detail)"
>
    {{if .Error}}
    <div class="global-banner">
        <div class="alert alert--error">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {{.Error}}
        </div>
    </div>
    {{end}}

    {{if .Success}}
    <div class="global-banner">
        <div class="alert alert--success">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            {{.Success}}
        </div>
    </div>
    {{end}}

    {{embed}}
</div>

{{if notificationsEnabled}}
{{if .Username}}
<script>
    (function() {
        function startSSE() {
            if (!window.EventSource) return;
            var es = new EventSource('/events');
            es.addEventListener('message', function(e) {
                try { var data = JSON.parse(e.data); } catch(err) { return; }
                if (Notification.permission === 'granted') {
                    new Notification('New mail from ' + (data.from || 'unknown'), {
                        body: data.subject || '(no subject)',
                        icon: '/assets/icon.png'
                    });
                }
            });
        }
        if (typeof Notification !== 'undefined') {
            if (Notification.permission === 'granted') {
                startSSE();
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(function(p) { if (p === 'granted') startSSE(); });
            }
        } else {
            startSSE();
        }
    })();
</script>
{{end}}
{{end}}

{{if webPushEnabled}}
{{if .Username}}
<script>
// LilMail Web Push — service worker registration + subscription management.
// Called from the Settings page "Enable push notifications" button as
// window.lilmailPush.enable(), or from a prior subscription stored in the SW.
(function() {
    'use strict';

    // urlBase64ToUint8Array converts a base64url string to a Uint8Array for
    // use as the applicationServerKey in PushManager.subscribe().
    function urlBase64ToUint8Array(base64String) {
        var padding = '='.repeat((4 - base64String.length % 4) % 4);
        var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        var rawData = atob(base64);
        var outputArray = new Uint8Array(rawData.length);
        for (var i = 0; i < rawData.length; ++i) {
            outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
    }

    // registerAndSubscribe registers the service worker and subscribes for push.
    // Returns a Promise that resolves with the subscription JSON on success.
    function registerAndSubscribe() {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
            return Promise.reject(new Error('Push not supported in this browser'));
        }
        return navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) {
                // Fetch VAPID public key.
                return fetch('/api/push/vapid-public')
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        var key = urlBase64ToUint8Array(data.publicKey);
                        return reg.pushManager.subscribe({
                            userVisibleOnly: true,
                            applicationServerKey: key
                        });
                    });
            })
            .then(function(sub) {
                var subJson = sub.toJSON();
                // POST the subscription to the server.
                return fetch('/api/push/subscribe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + (document.getElementById('app-token') ? document.getElementById('app-token').dataset.token : '')
                    },
                    body: JSON.stringify(subJson)
                }).then(function(r) {
                    if (!r.ok) throw new Error('Server rejected subscription');
                    return subJson;
                });
            });
    }

    // unsubscribe removes the subscription both from the browser and the server.
    function unsubscribe() {
        if (!('serviceWorker' in navigator)) return Promise.resolve();
        return navigator.serviceWorker.ready
            .then(function(reg) { return reg.pushManager.getSubscription(); })
            .then(function(sub) {
                if (!sub) return;
                var endpoint = sub.endpoint;
                return sub.unsubscribe().then(function() {
                    return fetch('/api/push/subscribe', {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + (document.getElementById('app-token') ? document.getElementById('app-token').dataset.token : '')
                        },
                        body: JSON.stringify({ endpoint: endpoint })
                    });
                });
            });
    }

    // Expose public API for the Settings page.
    window.lilmailPush = {
        enable: function() {
            return Notification.requestPermission().then(function(perm) {
                if (perm !== 'granted') throw new Error('Notification permission denied');
                return registerAndSubscribe();
            });
        },
        disable: unsubscribe,
        isSupported: function() {
            return ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window);
        },
        isSubscribed: function() {
            if (!('serviceWorker' in navigator)) return Promise.resolve(false);
            return navigator.serviceWorker.ready
                .then(function(reg) { return reg.pushManager.getSubscription(); })
                .then(function(sub) { return sub !== null; });
        }
    };

    // Auto-register the service worker on page load so push events are received
    // even without the Settings page (the subscription was already persisted).
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' });
    }
})();
</script>
{{end}}
{{end}}

<script>
    document.addEventListener('alpine:init', function() {
        Alpine.store('ui', { sidebarOpen: false });
    });

    document.body.addEventListener('htmx:configRequest', function(evt) {
        const token = '{{.Token}}';
        if (token) evt.detail.headers['Authorization'] = 'Bearer ' + token;
    });

    (function() {
        var bar = document.getElementById('htmx-loading-bar');
        if (!bar) return;
        document.addEventListener('htmx:beforeRequest', function() { bar.style.width = '50%'; });
        document.addEventListener('htmx:afterRequest', function() {
            bar.style.width = '100%';
            setTimeout(function() { bar.style.width = '0'; }, 300);
        });
    })();
</script>
</body>
</html>
