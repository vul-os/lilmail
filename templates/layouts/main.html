<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} — LilMail{{else}}LilMail{{end}}</title>
    <link rel="stylesheet" href="/assets/css/mail.css">
    <!-- HTMX -->
    <script src="/assets/vendor/htmx.min.js"></script>
    <!-- Alpine.js -->
    <script defer src="/assets/vendor/alpine.min.js"></script>
</head>
<body>

<div id="htmx-loading-bar"></div>

{{if .Username}}
<!-- TOP BAR -->
<header class="topbar" x-data>
    <!-- Hamburger (mobile) -->
    <button class="topbar__hamburger"
            @click="$store.ui.sidebarOpen = !$store.ui.sidebarOpen"
            aria-label="Toggle sidebar">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
    </button>

    <!-- Logo -->
    <a href="/inbox" class="topbar__logo">
        <div class="topbar__logo-mark">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <span class="topbar__logo-name">LilMail</span>
    </a>

    <!-- Search -->
    <div class="topbar__search">
        <svg class="topbar__search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
        </svg>
        <input type="search" placeholder="Search mail"
               class="topbar__search-input"
               aria-label="Search mail"
               name="q"
               hx-get="/api/search"
               hx-trigger="search, keyup changed delay:500ms"
               hx-target="#email-list-inner"
               hx-swap="innerHTML"
               hx-include="[name='q']">
    </div>

    <!-- Account -->
    <div class="topbar__account">
        <span class="topbar__username">{{.Username}}</span>
        <a href="/logout" class="topbar__logout">Sign out</a>
    </div>
</header>
{{end}}

<!-- MAIN CONTENT -->
<div class="{{if .Username}}app-body{{end}}"
     x-data="{
         showEmailViewer: false,
         showComposeModal: false,
         toasts: [],
         addToast(toast) {
             const id = Date.now();
             this.toasts.push({ id, ...toast });
             setTimeout(() => this.removeToast(id), 5000);
         },
         removeToast(id) {
             this.toasts = this.toasts.filter(t => t.id !== id);
         }
     }"
     @show-toast.window="addToast($event.detail)"
>
    {{if .Error}}
    <div class="global-banner">
        <div class="alert alert--error">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {{.Error}}
        </div>
    </div>
    {{end}}

    {{if .Success}}
    <div class="global-banner">
        <div class="alert alert--success">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            {{.Success}}
        </div>
    </div>
    {{end}}

    {{embed}}
</div>

{{if notificationsEnabled}}
{{if .Username}}
<script>
    (function() {
        function startSSE() {
            if (!window.EventSource) return;
            var es = new EventSource('/events');
            es.addEventListener('message', function(e) {
                try { var data = JSON.parse(e.data); } catch(err) { return; }
                if (Notification.permission === 'granted') {
                    new Notification('New mail from ' + (data.from || 'unknown'), {
                        body: data.subject || '(no subject)',
                        icon: '/assets/icon.png'
                    });
                }
            });
        }
        if (typeof Notification !== 'undefined') {
            if (Notification.permission === 'granted') {
                startSSE();
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().then(function(p) { if (p === 'granted') startSSE(); });
            }
        } else {
            startSSE();
        }
    })();
</script>
{{end}}
{{end}}

<script>
    document.addEventListener('alpine:init', function() {
        Alpine.store('ui', { sidebarOpen: false });
    });

    document.body.addEventListener('htmx:configRequest', function(evt) {
        const token = '{{.Token}}';
        if (token) evt.detail.headers['Authorization'] = 'Bearer ' + token;
    });

    (function() {
        var bar = document.getElementById('htmx-loading-bar');
        if (!bar) return;
        document.addEventListener('htmx:beforeRequest', function() { bar.style.width = '50%'; });
        document.addEventListener('htmx:afterRequest', function() {
            bar.style.width = '100%';
            setTimeout(function() { bar.style.width = '0'; }, 300);
        });
    })();
</script>
</body>
</html>
