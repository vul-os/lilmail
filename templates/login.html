<div class="login-page" x-data="{ loading: false }" @submit.prevent="loading = true; $event.target.submit()">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <img src="/assets/lilmail-logo.svg" alt="lilmail" class="login-logo-img">
        </div>

        {{if .Error}}
        <div class="alert alert--error">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {{.Error}}
        </div>
        {{end}}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Email address</label>
                <input id="email" name="email" type="email" autocomplete="email" required
                       value="{{.Email}}"
                       placeholder="you@example.com"
                       class="form-input"
                       :disabled="loading">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required
                       placeholder="••••••••"
                       class="form-input"
                       :disabled="loading">
            </div>

            <div class="form-group" style="margin-bottom: 18px;">
                <label class="form-check">
                    <input id="remember_me" name="remember_me" type="checkbox">
                    Remember me for 30 days
                </label>
            </div>

            <button type="submit" class="btn-primary" :disabled="loading">
                <svg x-show="loading" style="width:14px;height:14px;animation:spin .7s linear infinite" fill="none" viewBox="0 0 24 24">
                    <circle style="opacity:.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path style="opacity:.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                </svg>
                <span x-text="loading ? 'Signing in…' : 'Sign in'">Sign in</span>
            </button>
        </form>

        {{if .OAuth2Enabled}}
        <div class="divider">or</div>
        <a href="/auth/oauth/login" class="btn-secondary">Continue with OAuth2</a>
        {{end}}

        <p class="form-hint">Requires IMAP server credentials</p>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" x-show="loading" x-cloak style="display:none">
        <div class="spinner-ring"></div>
    </div>
</div>
