{{ define "compose-modal" }}
<!-- Gmail-style docked compose card — bottom-right on desktop, full-screen on mobile -->
<div x-show="showComposeModal"
     x-cloak
     x-data="{
         loading: false,
         minimized: false,
         resetForm() {
             const f = document.getElementById('compose-form');
             if (f) f.reset();
             this.loading = false;
             this.minimized = false;
         }
     }"
     x-init="$watch('showComposeModal', v => { if (!v) resetForm() })"
     class="fixed z-50"
     :class="{
         'inset-0': !minimized && window.innerWidth < 1024,
         'bottom-0 right-4 w-full max-w-sm': window.innerWidth >= 1024 || minimized
     }"
     role="dialog"
     aria-modal="true"
     aria-label="Compose new message"
>
    <!-- Mobile backdrop -->
    <div class="lg:hidden fixed inset-0 bg-black/40"
         x-show="!minimized"
         @click="showComposeModal = false"
         x-transition:enter="transition-opacity ease-out duration-150"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-in duration-100"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
    </div>

    <!-- Compose card -->
    <div class="relative flex flex-col rounded-t-xl shadow-2xl bg-white ring-1 ring-black/10
                lg:w-96 lg:mx-auto"
         :class="{
             'h-screen lg:h-auto': !minimized,
             'h-auto': minimized
         }"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4"
    >
        <!-- Card header / drag bar -->
        <div class="flex items-center justify-between px-4 py-2.5 bg-gray-800 rounded-t-xl cursor-pointer select-none"
             @click.self="minimized = !minimized">
            <span class="text-sm font-medium text-white">New Message</span>
            <div class="flex items-center gap-1">
                <!-- Minimize/restore -->
                <button @click.stop="minimized = !minimized"
                        class="p-1 rounded text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
                        :title="minimized ? 'Restore' : 'Minimize'">
                    <svg x-show="!minimized" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/>
                    </svg>
                    <svg x-show="minimized" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5"/>
                    </svg>
                </button>
                <!-- Close -->
                <button @click.stop="showComposeModal = false"
                        class="p-1 rounded text-gray-300 hover:text-white hover:bg-white/10 transition-colors"
                        title="Close">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Form (hidden when minimized) -->
        <div x-show="!minimized" x-cloak>
            <form id="compose-form"
                  hx-post="/api/compose"
                  hx-swap="none"
                  @htmx:before-request="loading = true"
                  @htmx:after-request="loading = false"
                  @htmx:response-error="$dispatch('show-toast', { type: 'error', title: 'Error', message: 'Failed to send email' })"
                  hx-on::after-request="(() => {
                      try {
                          const r = JSON.parse(event.detail.xhr.responseText);
                          if (r.success) {
                              $dispatch('show-toast', { type: 'success', title: 'Sent', message: 'Email sent successfully!' });
                              $nextTick(() => { resetForm(); showComposeModal = false; });
                          } else {
                              $dispatch('show-toast', { type: 'error', title: 'Error', message: r.error || r.message || 'Failed to send email' });
                          }
                      } catch(e) {}
                  })()"
            >
                <!-- To -->
                <div class="flex items-center border-b border-gray-200 px-4">
                    <label for="compose-to" class="text-xs font-medium text-gray-500 w-10 flex-shrink-0 py-2.5">To</label>
                    <input type="email" name="to" id="compose-to" required
                           placeholder="Recipients"
                           :disabled="loading"
                           class="flex-1 py-2.5 text-sm bg-transparent border-0 outline-none placeholder-gray-400 disabled:opacity-60">
                </div>

                <!-- Subject -->
                <div class="flex items-center border-b border-gray-200 px-4">
                    <label for="compose-subject" class="text-xs font-medium text-gray-500 w-10 flex-shrink-0 py-2.5">Subj</label>
                    <input type="text" name="subject" id="compose-subject" required
                           placeholder="Subject"
                           :disabled="loading"
                           class="flex-1 py-2.5 text-sm bg-transparent border-0 outline-none placeholder-gray-400 disabled:opacity-60">
                </div>

                <!-- Body -->
                <textarea name="body" id="compose-body" required
                          placeholder="Compose email"
                          :disabled="loading"
                          class="w-full px-4 py-3 text-sm bg-transparent border-0 outline-none
                                 resize-none placeholder-gray-400 disabled:opacity-60
                                 lg:min-h-[220px] min-h-[calc(100vh-16rem)]"
                ></textarea>

                <!-- Toolbar row -->
                <div class="flex items-center justify-between px-3 py-2 border-t border-gray-100">
                    <!-- Send button -->
                    <button type="submit"
                            :disabled="loading"
                            class="inline-flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-medium
                                   bg-blue-600 hover:bg-blue-700 text-white disabled:opacity-50 transition-colors">
                        <svg x-show="loading" class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                        </svg>
                        <span x-text="loading ? 'Sending…' : 'Send'">Send</span>
                    </button>
                    <!-- Discard -->
                    <button type="button"
                            @click="showComposeModal = false"
                            :disabled="loading"
                            class="p-2 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors disabled:opacity-50"
                            title="Discard">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{{ end }}
