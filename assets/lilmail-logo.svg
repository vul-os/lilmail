<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60" role="img" aria-label="lilmail">
  <title>lilmail</title>
  <defs>
    <!-- Warm paper gradient for envelope body -->
    <linearGradient id="lm-envGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8dfd0"/>
    </linearGradient>
    <!-- Indigo accent gradient for the flap -->
    <linearGradient id="lm-flapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Subtle drop shadow -->
    <filter id="lm-shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- ── Envelope icon (44×36 at x=4, y=12) ── -->

  <!-- Envelope body — warm parchment -->
  <rect x="4" y="12" width="44" height="36" rx="5" ry="5"
        fill="url(#lm-envGrad)" stroke="#c9b99a" stroke-width="1"
        filter="url(#lm-shadow)"/>

  <!-- Bottom-corner fold lines -->
  <line x1="4"  y1="48" x2="26" y2="31" stroke="#c9b99a" stroke-width="0.75" opacity="0.55"/>
  <line x1="48" y1="48" x2="26" y2="31" stroke="#c9b99a" stroke-width="0.75" opacity="0.55"/>

  <!-- Flap — solid indigo triangle -->
  <path d="M 5 14 L 26 31 L 47 14 Z"
        fill="url(#lm-flapGrad)"/>

  <!-- Flap top edge -->
  <line x1="4" y1="13" x2="48" y2="13" stroke="#818cf8" stroke-width="0.6" opacity="0.4"/>

  <!-- Small letter-lines peeking below the flap -->
  <line x1="13" y1="37" x2="39" y2="37" stroke="#b0a090" stroke-width="1.1" stroke-linecap="round" opacity="0.45"/>
  <line x1="13" y1="42" x2="30" y2="42" stroke="#b0a090" stroke-width="1.1" stroke-linecap="round" opacity="0.3"/>

  <!-- ── Wordmark ── -->
  <!-- "lil" — light weight, warm dark -->
  <text x="60" y="40"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="27" font-weight="300" letter-spacing="-0.3"
        fill="#3d3530">lil</text>

  <!-- "mail" — bold, indigo -->
  <text x="94" y="40"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="27" font-weight="700" letter-spacing="-0.8"
        fill="#4f46e5">mail</text>
</svg>
